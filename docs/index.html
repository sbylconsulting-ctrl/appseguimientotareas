/* ---------------------------------------------------------------
   STORAGE HOOKS
   - useSheetApiUrl: usa la URL fija SHEET_API_URL; no pide nada al usuario.
   - useSheetCollection: lee/escribe una "tabla" en el Sheet vía fetch()
     contra el Apps Script y se refresca periódicamente para pintar datos
     modificados en el Sheet.
   - useAuth: sesión con token, contraseña y dispositivo de confianza.
---------------------------------------------------------------- */
function getAppBaseUrl() {
  return window.location.origin + window.location.pathname;
}

function getProjectIdFromUrl() {
  try { return new URLSearchParams(window.location.search).get("project") || null; }
  catch (e) { return null; }
}

function setProjectIdInUrl(projectId) {
  try {
    const url = new URL(window.location.href);
    if (projectId) {
      url.searchParams.set("project", projectId);
    } else {
      url.searchParams.delete("project");
      url.searchParams.delete("source");
    }
    window.history.replaceState({}, "", url.toString());
  } catch (e) {}
}

async function apiCall(apiUrl, payload) {
  const finalPayload = { appUrl: getAppBaseUrl(), ...(payload || {}) };
  const res = await fetch(apiUrl, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" }, // evita preflight CORS en Apps Script
    body: JSON.stringify(finalPayload),
  });
  const json = await res.json();
  if (!json.ok) throw new Error(json.error || "Respuesta inválida del servidor");
  return json;
}

async function sheetGet(apiUrl, key, token) {
  const json = await apiCall(apiUrl, { action: "get", key, token });
  return json.value == null ? null : json.value;
}

async function sheetSet(apiUrl, key, value, token) {
  await apiCall(apiUrl, { action: "set", key, value, token });
  return true;
}

async function sheetTestConnection(apiUrl) {
  const json = await apiCall(apiUrl, { action: "bootstrap" });
  return json;
}

async function authSetupAdmin(apiUrl, { name, email, password, deviceId }) {
  return apiCall(apiUrl, { action: "setupAdmin", name, email, password, deviceId, trustDevice: true });
}
async function authLogin(apiUrl, { email, password, deviceId, trustDevice }) {
  return apiCall(apiUrl, { action: "login", email, password, deviceId, trustDevice });
}
async function authTrustedLogin(apiUrl, { email, deviceId }) {
  return apiCall(apiUrl, { action: "trustedLogin", email, deviceId });
}
async function authSession(apiUrl, token) {
  return apiCall(apiUrl, { action: "session", token });
}
async function authMigrationSetPassword(apiUrl, { email, password, deviceId, trustDevice }) {

async function authLogoutDevice(apiUrl, { token, deviceId }) {

function useSheetApiUrl() {
  const url = (SHEET_API_URL || "").trim();
  const configured = url && !url.includes("PEGA_AQUI") && url.endsWith("/exec");
  return { url: configured ? url : null, setUrl: () => {}, loading: false };
}

const STORAGE_KEYS = {
  deviceId: "trackr.deviceId.v2",
  sessionToken: "trackr.sessionToken.v2",
  lastEmail: "trackr.lastEmail.v2",
};

function randomId(len = 32) {
  const bytes = new Uint8Array(len);
  if (window.crypto && window.crypto.getRandomValues) {
    window.crypto.getRandomValues(bytes);
    return Array.from(bytes).map((b) => b.toString(16).padStart(2, "0")).join("");
  }
  return Math.random().toString(36).slice(2) + Date.now().toString(36);
}

function getDeviceId() {
  let id = localStorage.getItem(STORAGE_KEYS.deviceId);
  if (!id) {
    id = randomId(32);
    localStorage.setItem(STORAGE_KEYS.deviceId, id);
  }
  return id;
}

function clearStoredSession({ forgetDevice = false } = {}) {
  localStorage.removeItem(STORAGE_KEYS.sessionToken);
  if (forgetDevice) localStorage.removeItem(STORAGE_KEYS.lastEmail);
}

function useAuth(apiUrl) {
  const [token, setToken] = useState(() => localStorage.getItem(STORAGE_KEYS.sessionToken));
  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(true);
  const [authError, setAuthError] = useState(null);
  const [rememberedEmail, setRememberedEmail] = useState(() => localStorage.getItem(STORAGE_KEYS.lastEmail) || "");

  const finishAuth = useCallback((payload, emailForDevice) => {
    setToken(payload.token);
    setUser(payload.user);
    localStorage.setItem(STORAGE_KEYS.sessionToken, payload.token);
    if (emailForDevice) {
      localStorage.setItem(STORAGE_KEYS.lastEmail, emailForDevice.trim().toLowerCase());
      setRememberedEmail(emailForDevice.trim().toLowerCase());
    }
    setAuthError(null);
  }, []);

  useEffect(() => {
    let cancelled = false;
    const run = async () => {
      if (!apiUrl) return;
      setLoading(true);
      const storedToken = localStorage.getItem(STORAGE_KEYS.sessionToken);
      const storedEmail = localStorage.getItem(STORAGE_KEYS.lastEmail);
      try {
        if (storedToken) {
          const payload = await authSession(apiUrl, storedToken);
          if (!cancelled) finishAuth(payload, payload.user.email);
          return;
        }
        if (storedEmail) {
          const payload = await authTrustedLogin(apiUrl, { email: storedEmail, deviceId: getDeviceId() });
          if (!cancelled) finishAuth(payload, storedEmail);
          return;
        }
      } catch (e) {
        clearStoredSession();
        if (!cancelled) setAuthError(null);
      } finally {
        if (!cancelled) setLoading(false);
      }
    };
    run();
    return () => { cancelled = true; };
  }, [apiUrl, finishAuth]);

  const setupAdmin = useCallback(async ({ name, email, password }) => {
    const payload = await authSetupAdmin(apiUrl, { name, email, password, deviceId: getDeviceId() });
    finishAuth(payload, email);
    return payload;
  }, [apiUrl, finishAuth]);

  const login = useCallback(async ({ email, password, trustDevice }) => {
    const payload = await authLogin(apiUrl, { email, password, trustDevice, deviceId: getDeviceId() });
    finishAuth(payload, trustDevice ? email : "");
    if (!trustDevice) localStorage.removeItem(STORAGE_KEYS.lastEmail);
    return payload;
  }, [apiUrl, finishAuth]);

  const trustedLogin = useCallback(async (email) => {
    const payload = await authTrustedLogin(apiUrl, { email, deviceId: getDeviceId() });
    finishAuth(payload, email);
    return payload;
  }, [apiUrl, finishAuth]);

  const migratePassword = useCallback(async ({ email, password, trustDevice }) => {
    const payload = await authMigrationSetPassword(apiUrl, { email, password, trustDevice, deviceId: getDeviceId() });
    finishAuth(payload, trustDevice ? email : "");
    return payload;
  }, [apiUrl, finishAuth]);

  const logout = useCallback(async ({ forgetDevice = false } = {}) => {
    const currentToken = localStorage.getItem(STORAGE_KEYS.sessionToken) || token;
    try {
      if (forgetDevice && currentToken) await authLogoutDevice(apiUrl, { token: currentToken, deviceId: getDeviceId() });
    } catch (e) {}
    clearStoredSession({ forgetDevice });
    setToken(null);
    setUser(null);
    if (forgetDevice) setRememberedEmail("");
  }, [apiUrl, token]);

  return { token, user, loading, authError, rememberedEmail, setupAdmin, login, trustedLogin, migratePassword, logout, setUser };
}

function useSheetCollection(apiUrl, key, seed, token) {
  const [data, setDataState] = useState(seed || []);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [saving, setSaving] = useState(false);

  const loadFromSheet = useCallback(async ({ initializeIfMissing = false, silent = false } = {}) => {
    if (!apiUrl || !token) return;
    if (!silent) setLoading(true);
    try {
      let value = await sheetGet(apiUrl, key, token);
      if (!value && initializeIfMissing) {
        value = seed || [];
        await sheetSet(apiUrl, key, value, token);
      }
      setDataState(value || seed || []);
      setError(null);
    } catch (e) {
      setError("No se pudo conectar con el Sheet (" + e.message + ").");
    } finally {
      if (!silent) setLoading(false);
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [key, apiUrl, token]);

  useEffect(() => {
    if (!apiUrl || !token) {
      setLoading(false);
      return;
    }
    loadFromSheet({ initializeIfMissing: true });
  }, [key, apiUrl, token, loadFromSheet]);

  useEffect(() => {
    if (!apiUrl || !token) return;
    const timer = setInterval(() => {
      if (!saving) loadFromSheet({ silent: true });
    }, SHEET_POLL_MS);
    return () => clearInterval(timer);
  }, [apiUrl, token, saving, loadFromSheet]);

  const persist = useCallback(async (next) => {
    setDataState(next);
    if (!apiUrl || !token) return;
    setSaving(true);
    try {
      await sheetSet(apiUrl, key, next, token);
      setError(null);
      const confirmed = await sheetGet(apiUrl, key, token);
      if (confirmed) setDataState(confirmed);
    } catch (e) {
      setError("No se pudo guardar en el Sheet (" + e.message + ").");
    } finally {
      setSaving(false);
    }
  }, [key, apiUrl, token]);

  return { data, setData: persist, setLocalData: setDataState, loading, error, saving, reload: loadFromSheet };
}

function ConfigureSheet({ initialUrl, onSaved }) {
  const [url, setUrl] = useState(initialUrl || "");
  const [status, setStatus] = useState("idle"); // idle | testing | ok | error
  const [errMsg, setErrMsg] = useState("");

  const test = async () => {
    setStatus("testing");
    setErrMsg("");
    try {
      await sheetTestConnection(url.trim());
      setStatus("ok");
    } catch (e) {
      setStatus("error");
      setErrMsg(e.message);
    }
  };

  return (
    <div className="min-h-screen flex items-center justify-center px-4" style={{ background: COLORS.paper, fontFamily: "'Inter', sans-serif" }}>
      <style>{FONT_IMPORT}</style>

        <p className="text-sm mb-5" style={{ color: COLORS.textDim }}>
          Pega la URL de tu Apps Script Web App (termina en <code>/exec</code>). Todos los que usen esta app compartirán los mismos datos, guardados en tu Sheet.
        </p>
        <Field label="URL de la Web App">
          <input
            className={inputCls} style={inputStyle}
            placeholder="https://script.google.com/macros/s/XXXXX/exec"
            value={url}
            onChange={(e) => { setUrl(e.target.value); setStatus("idle"); }}
          />
        </Field>
        {status === "ok" && (
          <div className="flex items-center gap-2 text-sm px-3 py-2 rounded-lg mb-4" style={{ background: COLORS.greenSoft, color: COLORS.green }}>
            <CheckCircle2 size={16} /> Conexión correcta.
          </div>
        )}
        {status === "error" && (
          <div className="flex items-center gap-2 text-sm px-3 py-2 rounded-lg mb-4" style={{ background: COLORS.redSoft, color: COLORS.red }}>
            <AlertTriangle size={16} /> No se pudo conectar: {errMsg}
          </div>
        )}
        <div className="flex gap-2">
          <button
            disabled={!url.trim() || status === "testing"}
            onClick={test}
            className="flex-1 py-2.5 rounded-lg text-sm font-semibold border transition"
            style={{ borderColor: COLORS.line, color: status === "testing" ? COLORS.textDim : COLORS.ink }}
          >
            {status === "testing" ? "Probando…" : "Probar conexión"}
          </button>
          <button
            disabled={status !== "ok"}
            onClick={() => onSaved(url.trim())}
            className="flex-1 py-2.5 rounded-lg text-sm font-semibold text-white transition"
            style={{ background: status === "ok" ? COLORS.accent : "#C7C8E8" }}
          >
            Guardar y continuar
          </button>
        </div>
      </div>
    </div>
  );
}

function SetupAdmin({ onCreate }) {

function SignIn({ onSignIn, onTrustedSignIn, rememberedEmail, migrationRequired, onMigratePassword }) {
  const [email, setEmail] = useState(rememberedEmail || "");
  const [password, setPassword] = useState("");
  const [trustDevice, setTrustDevice] = useState(true);
  const [mode, setMode] = useState(migrationRequired ? "migrate" : "login");
  const [confirm, setConfirm] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);
  const validLogin = validEmail(email) && password.length >= 1;
  const validMigration = validEmail(email) && password.length >= 8 && password === confirm;

  useEffect(() => { if (rememberedEmail && !email) setEmail(rememberedEmail); }, [rememberedEmail]);

  const submit = async () => {
    setLoading(true);
    setError("");
    try {
      if (mode === "migrate") {
        await onMigratePassword({ email: email.trim().toLowerCase(), password, trustDevice });
      } else {
        await onSignIn({ email: email.trim().toLowerCase(), password, trustDevice });
      }
    } catch (e) {
      setError(e.message || String(e));
    } finally {
      setLoading(false);
    }
  };

  const useTrusted = async () => {
    setLoading(true);
    setError("");
    try {
      await onTrustedSignIn((rememberedEmail || email).trim().toLowerCase());
    } catch (e) {
      setError(e.message || "Este dispositivo todavía no está autorizado.");
    } finally {
      setLoading(false);
    }
  };

  return (
    <div className="min-h-screen px-4 py-8 flex items-center justify-center" style={{ background: COLORS.paper, fontFamily: "'Inter', sans-serif" }}>
      <style>{FONT_IMPORT}</style>
      <div className="w-full max-w-md bg-white rounded-2xl border p-7" style={{ borderColor: COLORS.line }}>
        <div className="w-10 h-10 rounded-xl flex items-center justify-center mb-4" style={{ background: COLORS.accent }}>
          <Lock size={18} color="white" />
        </div>
        <h1 className="text-xl font-bold mb-1" style={{ fontFamily: "'Space Grotesk', sans-serif" }}>Entrar en Trackr</h1>
        <p className="text-sm mb-5" style={{ color: COLORS.textDim }}>
          {mode === "migrate" ? "Configura una contraseña para un usuario existente creado con la versión anterior." : "Introduce tu correo y contraseña. Si marcas dispositivo de confianza, la próxima vez entrarás automáticamente desde este navegador."}
        </p>

        {rememberedEmail && mode === "login" && (
          <button onClick={useTrusted} disabled={loading} className="w-full flex items-center justify-between px-3 py-2.5 rounded-lg border text-sm font-semibold mb-4" style={{ borderColor: COLORS.line }}>
            <span>Entrar sin contraseña en este dispositivo</span>
            <ArrowRight size={15} />
          </button>
        )}

        <Field label="Correo">
          <input className={inputCls} style={inputStyle} value={email} onChange={(e) => setEmail(e.target.value)} placeholder="tu@empresa.com" autoComplete="username" />
        </Field>
        <Field label={mode === "migrate" ? "Nueva contraseña" : "Contraseña"}>
          <PasswordInput value={password} onChange={(e) => setPassword(e.target.value)} autoComplete={mode === "migrate" ? "new-password" : "current-password"} />
        </Field>
        {mode === "migrate" && (
          <Field label="Repetir contraseña" hint={confirm && password !== confirm ? "Las contraseñas no coinciden." : ""}>
            <PasswordInput value={confirm} onChange={(e) => setConfirm(e.target.value)} autoComplete="new-password" />
          </Field>
        )}
        <label className="flex items-start gap-2 text-sm mb-4 select-none">
          <input type="checkbox" checked={trustDevice} onChange={(e) => setTrustDevice(e.target.checked)} className="mt-1" />
          <span>Confiar en este dispositivo y no pedir contraseña la próxima vez.</span>
        </label>
        {error && <div className="text-sm px-3 py-2 rounded-lg mb-4" style={{ background: COLORS.redSoft, color: COLORS.red }}>{error}</div>}
        <button
          disabled={loading || (mode === "migrate" ? !validMigration : !validLogin)}
          onClick={submit}
          style={{ background: !loading && (mode === "migrate" ? validMigration : validLogin) ? COLORS.accent : "#C7C8E8" }}
          className="w-full py-2.5 rounded-lg text-sm font-semibold text-white transition"
        >
          {loading ? "Comprobando…" : mode === "migrate" ? "Guardar contraseña y entrar" : "Entrar"}
        </button>
        {migrationRequired && (
          <button onClick={() => { setMode(mode === "login" ? "migrate" : "login"); setError(""); }} className="w-full text-xs mt-3" style={{ color: COLORS.textDim }}>
            {mode === "login" ? "Tengo un usuario antiguo sin contraseña" : "Ya tengo contraseña"}
          </button>
        )}
      </div>
    </div>
  );
}

      <Field label="Cambios de estado"><textarea className={inputCls} style={inputStyle} rows={2} value={f.statusChange} onChange={set("statusChange")} /></Field>
      <Field label="Nuevos riesgos o bloqueos"><textarea className={inputCls} style={inputStyle} rows={2} value={f.newRisks} onChange={set("newRisks")} /></Field>
      <Field label="Próximos pasos"><textarea className={inputCls} style={inputStyle} rows={2} value={f.nextSteps} onChange={set("nextSteps")} /></Field>
      <Field label="Decisiones necesarias"><textarea className={inputCls} style={inputStyle} rows={2} value={f.decisions} onChange={set("decisions")} /></Field>
      {f.semaphore === "red" && (
        <div className="flex items-center gap-2 text-sm px-3 py-2 rounded-lg mb-4" style={{ background: COLORS.redSoft, color: COLORS.red }}>
          <AlertTriangle size={16} /> Al guardar con semáforo Rojo se notificará a los usuarios con acceso a este proyecto.
        </div>
      )}
      <div className="flex justify-end gap-2 pt-2">
        <button onClick={onCancel} className="px-4 py-2 rounded-lg text-sm font-medium hover:bg-gray-100">Cancelar</button>
        <button disabled={!valid} onClick={() => onSave(f)} style={{ background: valid ? COLORS.accent : "#C7C8E8" }} className="px-4 py-2 rounded-lg text-sm font-medium text-white">Guardar actualización</button>
      </div>
    </div>
  );
}

/* ---------------------------------------------------------------
   SHARE PANEL (admin decides visibility)
---------------------------------------------------------------- */
function SharePanel({ project, users, onChange }) {
  const [email, setEmail] = useState("");
  const isAll = project.sharedWith === "all";
  const list = isAll ? [] : (project.sharedWith || []);
  const candidates = users.filter((u) => u.active && u.email !== "");

  const addShare = (targetEmail) => {
    const e = targetEmail.trim().toLowerCase();
    const registered = users.find((u) => u.email === e && u.active);
    if (!registered) return;
    if (isAll) return;
    if (list.includes(e)) return;
    onChange([...list, e], true);
    setEmail("");
  };
  const removeShare = (e) => {
    onChange(list.filter((x) => x !== e), false);
  };

  return (
    <Section title="Compartir y visibilidad">
      <div className="flex items-center justify-between mb-3">
        <span className="text-sm">Visible para todos los usuarios</span>
        <button
          onClick={() => onChange(isAll ? [] : "all", false)}
          className="text-xs font-semibold px-2.5 py-1 rounded-full"
          style={{ background: isAll ? COLORS.greenSoft : "#F1F2F0", color: isAll ? COLORS.green : COLORS.textDim }}
        >
          {isAll ? "Activado" : "Desactivado"}
        </button>
      </div>
      {!isAll && (
        <>
          <div className="flex gap-2 mb-3">
            <input
              list="user-emails"
              className={inputCls} style={inputStyle}
              placeholder="correo@empresa.com"
              value={email}
              onChange={(e) => setEmail(e.target.value)}
              onKeyDown={(e) => e.key === "Enter" && addShare(email)}
            />
            <datalist id="user-emails">
              {candidates.map((u) => <option key={u.id} value={u.email} />)}
            </datalist>
            <button onClick={() => addShare(email)} className="px-3 py-2 rounded-lg text-sm font-medium text-white whitespace-nowrap" style={{ background: COLORS.accent }}>
              Compartir
            </button>
          </div>
          <p className="text-xs mb-2" style={{ color: COLORS.textDim }}>Solo puedes compartir con correos ya dados de alta como usuario.</p>
          <div className="space-y-1.5">
            {list.length === 0 && <p className="text-sm" style={{ color: COLORS.textDim }}>Nadie más tiene acceso todavía.</p>}
            {list.map((e) => {
              const u = users.find((x) => x.email === e);
              return (
                <div key={e} className="flex items-center justify-between text-sm px-2.5 py-1.5 rounded-lg" style={{ background: COLORS.paper }}>
                  <span>{u ? u.name : e} <span style={{ color: COLORS.textDim }}>· {e}</span></span>
                  <button onClick={() => removeShare(e)} className="p-1 rounded hover:bg-gray-200"><Trash2 size={13} color={COLORS.textDim} /></button>
                </div>
              );
            })}
          </div>
        </>
      )}
    </Section>
  );
}

/* ---------------------------------------------------------------
   DASHBOARD
---------------------------------------------------------------- */
function Dashboard({ projects, onOpen, onNew, canCreate }) {
  const active = projects.filter((p) => !p.archived);
  const counts = { green: 0, amber: 0, red: 0 };
  active.forEach((p) => counts[p.semaphore]++);
  const criticalRisk = active.filter((p) => p.risks.some((r) => r.severity === "Crítica" && r.status !== "Cerrado" && r.status !== "Mitigado"));
  const staleProjects = active.filter((p) => {
    const d = daysSince(p.lastUpdateAt);
    return d === null || d > 7;
  });

  const upcomingMilestones = active
    .flatMap((p) => p.phases.filter((ph) => ph.status !== "Completada" && ph.endDate).map((ph) => ({ ...ph, project: p.name, projectId: p.id })))
    .sort((a, b) => new Date(a.endDate) - new Date(b.endDate))
    .slice(0, 6);

  const [filter, setFilter] = useState("all");
  const [search, setSearch] = useState("");
  const filtered = active.filter((p) => {
    if (filter !== "all" && filter !== "stale" && filter !== "critical" && p.semaphore !== filter) return false;
    if (filter === "stale" && !staleProjects.includes(p)) return false;
    if (search && !p.name.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });

  const kpiCard = (label, value, color, icon, key) => (
    <button
      onClick={() => setFilter(filter === key ? "all" : key)}
      className="text-left rounded-2xl p-5 border transition hover:shadow-md flex-1 min-w-[150px]"
      style={{ borderColor: filter === key ? color : COLORS.line, background: COLORS.paperCard, boxShadow: filter === key ? `0 0 0 2px ${color}22` : "none" }}
    >
      <div className="flex items-center justify-between mb-3">
        <span className="text-xs font-semibold uppercase tracking-wide" style={{ color: COLORS.textDim }}>{label}</span>
        <div className="p-1.5 rounded-lg" style={{ background: color + "1A" }}>{icon}</div>
      </div>
      <div className="text-3xl font-bold" style={{ fontFamily: "'Space Grotesk', sans-serif", color: COLORS.ink }}>{value}</div>
    </button>
  );

  const rows = filter === "critical" ? criticalRisk : filtered;

  return (
    <div>
      <div className="flex items-start justify-between mb-6">
        <div>
          <h1 className="text-2xl font-bold" style={{ fontFamily: "'Space Grotesk', sans-serif" }}>Dashboard ejecutivo</h1>
          <p className="text-sm mt-1" style={{ color: COLORS.textDim }}>Visión consolidada de los proyectos a los que tienes acceso.</p>
        </div>
        {canCreate && (
          <button onClick={onNew} className="flex items-center gap-2 px-4 py-2.5 rounded-xl text-sm font-semibold text-white transition hover:opacity-90" style={{ background: COLORS.accent }}>
            <Plus size={16} /> Nuevo proyecto
          </button>
        )}
      </div>

      <div className="flex flex-wrap gap-3 mb-6">
        {kpiCard("Proyectos activos", active.length, COLORS.accent, <FolderKanban size={16} color={COLORS.accent} />, "all")}
        {kpiCard("En verde", counts.green, COLORS.green, <CheckCircle2 size={16} color={COLORS.green} />, "green")}
        {kpiCard("En ámbar", counts.amber, COLORS.amber, <AlertTriangle size={16} color={COLORS.amber} />, "amber")}
        {kpiCard("En rojo", counts.red, COLORS.red, <AlertTriangle size={16} color={COLORS.red} />, "red")}
        {kpiCard("Riesgo crítico", criticalRisk.length, COLORS.red, <ShieldAlert size={16} color={COLORS.red} />, "critical")}
        {kpiCard("Sin actualizar", staleProjects.length, COLORS.textDim, <Clock size={16} color={COLORS.textDim} />, "stale")}
      </div>

      <div className="grid grid-cols-3 gap-5 mb-6">
        <div className="col-span-2 rounded-2xl border p-5" style={{ borderColor: COLORS.line, background: COLORS.paperCard }}>
          <div className="flex items-center justify-between mb-4">
            <h2 className="font-semibold flex items-center gap-2" style={{ fontFamily: "'Space Grotesk', sans-serif" }}><FolderKanban size={16} /> Proyectos</h2>
            <div className="flex items-center gap-2">
              <div className="flex items-center gap-1.5 px-2.5 py-1.5 rounded-lg border text-sm" style={{ borderColor: COLORS.line }}>
                <Search size={14} color={COLORS.textDim} />
                <input value={search} onChange={(e) => setSearch(e.target.value)} placeholder="Buscar…" className="outline-none text-sm w-28" />
              </div>
              {filter !== "all" && (
                <button onClick={() => setFilter("all")} className="text-xs font-medium px-2 py-1 rounded-lg" style={{ background: COLORS.accentSoft, color: COLORS.accent }}>
                  Quitar filtro ✕
                </button>
              )}
            </div>
          </div>
          <div className="divide-y" style={{ borderColor: COLORS.line }}>
            {rows.length === 0 && <p className="text-sm py-6 text-center" style={{ color: COLORS.textDim }}>No hay proyectos que coincidan.</p>}
            {rows.map((p) => {
              const d = daysSince(p.lastUpdateAt);
              return (
                <button key={p.id} onClick={() => onOpen(p.id)} className="w-full flex items-center gap-4 py-3.5 text-left hover:bg-gray-50 transition rounded-lg px-2 -mx-2">
                  <SignalBar semaphore={p.semaphore} />
                  <div className="flex-1 min-w-0">
                    <div className="font-medium truncate">{p.name}</div>
                    <div className="text-xs truncate" style={{ color: COLORS.textDim }}>{p.owner} · {p.priority}</div>
                  </div>
                  {d !== null && d > 7 && (
                    <Pill color={COLORS.textDim} soft="#EEEEEC"><Clock size={11} /> {d}d sin actualizar</Pill>
                  )}
                  <span className="text-xs w-24 text-right" style={{ color: COLORS.textDim }}>Rev. {fmtDate(p.nextReview)}</span>
                  <ChevronRight size={16} color={COLORS.textDim} />
                </button>
              );
            })}
          </div>
        </div>

        <div className="rounded-2xl border p-5" style={{ borderColor: COLORS.line, background: COLORS.paperCard }}>
          <h2 className="font-semibold flex items-center gap-2 mb-4" style={{ fontFamily: "'Space Grotesk', sans-serif" }}><Milestone size={16} /> Próximos hitos</h2>
          <div className="space-y-3">
            {upcomingMilestones.length === 0 && <p className="text-sm" style={{ color: COLORS.textDim }}>Sin hitos próximos.</p>}
            {upcomingMilestones.map((m) => (
              <button key={m.id} onClick={() => onOpen(m.projectId)} className="w-full text-left block hover:bg-gray-50 rounded-lg p-2 -mx-2 transition">
                <div className="text-sm font-medium truncate">{m.name}</div>
                <div className="text-xs flex items-center gap-1.5 mt-0.5" style={{ color: COLORS.textDim }}>
                  <span>{m.project}</span><span>·</span><Calendar size={11} /><span>{fmtDate(m.endDate)}</span>
                </div>
              </button>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ---------------------------------------------------------------
   PROJECT DETAIL
---------------------------------------------------------------- */
function ProjectDetail({ project, onBack, onUpdate, onShare, onArchive, canEdit, isAdmin, users }) {
  const [tab, setTab] = useState("resumen");
  const [showEdit, setShowEdit] = useState(false);
  const [showPhase, setShowPhase] = useState(false);
  const [showRisk, setShowRisk] = useState(false);
  const [showUpdateForm, setShowUpdateForm] = useState(false);

  const tabs = [
    { id: "resumen", label: "Resumen", icon: <FileText size={14} /> },
    { id: "cronograma", label: "Cronograma", icon: <Milestone size={14} /> },
    { id: "riesgos", label: "Riesgos", icon: <ShieldAlert size={14} /> },
    { id: "actualizaciones", label: "Actualizaciones", icon: <History size={14} /> },
  ];
  if (isAdmin) tabs.push({ id: "compartir", label: "Compartir", icon: <Share2 size={14} /> });

  const sem = SEMAFORO[project.semaphore];

  return (
    <div>
      <button onClick={onBack} className="flex items-center gap-1.5 text-sm font-medium mb-4 hover:opacity-70" style={{ color: COLORS.textDim }}>
        <ChevronLeft size={16} /> Volver al dashboard
      </button>

      <div className="flex items-start justify-between mb-5">
        <div className="flex items-start gap-4">
          <SignalBar semaphore={project.semaphore} />
          <div>
            <h1 className="text-2xl font-bold" style={{ fontFamily: "'Space Grotesk', sans-serif" }}>{project.name}</h1>
            <div className="flex items-center gap-2 mt-1.5 flex-wrap">
              <Pill color={sem.color} soft={sem.soft}>{sem.label}</Pill>
              <Pill color={COLORS.accent} soft={COLORS.accentSoft}>{project.priority}</Pill>
              <span className="text-xs flex items-center gap-1" style={{ color: COLORS.textDim }}><User size={12} /> {project.owner}</span>
              <span className="text-xs flex items-center gap-1" style={{ color: COLORS.textDim }}><Users size={12} /> {project.stakeholders || "—"}</span>
            </div>
          </div>
        </div>
        {canEdit && (
          <div className="flex gap-2">
            <button onClick={() => setShowEdit(true)} className="flex items-center gap-1.5 px-3 py-2 rounded-lg text-sm font-medium border hover:bg-gray-50" style={{ borderColor: COLORS.line }}>
              <Pencil size={14} /> Editar
            </button>
            {isAdmin && (
              <button onClick={onArchive} className="flex items-center gap-1.5 px-3 py-2 rounded-lg text-sm font-medium border hover:bg-gray-50" style={{ borderColor: COLORS.line, color: COLORS.textDim }}>
                <Archive size={14} /> Archivar
              </button>
            )}
          </div>
        )}
      </div>

      <div className="flex gap-1 mb-5 border-b" style={{ borderColor: COLORS.line }}>
        {tabs.map((t) => (
          <button
            key={t.id}
            onClick={() => setTab(t.id)}
            className="flex items-center gap-1.5 px-4 py-2.5 text-sm font-medium border-b-2 -mb-px transition"
            style={{ borderColor: tab === t.id ? COLORS.accent : "transparent", color: tab === t.id ? COLORS.accent : COLORS.textDim }}
          >
            {t.icon} {t.label}
            {t.id === "riesgos" && project.risks.length > 0 && (
              <span className="text-xs rounded-full px-1.5" style={{ background: COLORS.redSoft, color: COLORS.red }}>{project.risks.length}</span>
            )}
          </button>
        ))}
      </div>

      {tab === "resumen" && (
        <div className="grid grid-cols-3 gap-5">
          <div className="col-span-2 space-y-4">
            <Section title="Resumen ejecutivo"><p className="text-sm leading-relaxed">{project.summary || "—"}</p></Section>
            <Section title="Objetivo del proyecto"><p className="text-sm leading-relaxed">{project.objective}</p></Section>
            <Section title="Estado actual"><p className="text-sm leading-relaxed">{project.currentStatus || "—"}</p></Section>
          </div>
          <div className="space-y-4">
            <Section title="Fechas">
              <InfoRow label="Inicio" value={fmtDate(project.startDate)} />
              <InfoRow label="Fin estimado" value={fmtDate(project.endDate)} />
              <InfoRow label="Próxima revisión" value={fmtDate(project.nextReview)} />
              <InfoRow label="Última actualización" value={fmtDate(project.lastUpdateAt)} />
            </Section>
            <Section title="Visibilidad">
              <p className="text-sm">{project.sharedWith === "all" ? "Visible para todos los usuarios" : `Compartido con ${(project.sharedWith || []).length} usuario(s)`}</p>
            </Section>
          </div>
        </div>
      )}

      {tab === "cronograma" && (
        <div>
          {canEdit && (
            <button onClick={() => setShowPhase(true)} className="flex items-center gap-1.5 mb-4 px-3 py-2 rounded-lg text-sm font-medium text-white" style={{ background: COLORS.accent }}>
              <Plus size={14} /> Añadir fase
            </button>
          )}
          <div className="space-y-3">
            {project.phases.length === 0 && <EmptyState text="Sin fases definidas todavía." />}
            {project.phases.map((ph, i) => (
              <div key={ph.id} className="rounded-2xl border p-4 flex gap-4" style={{ borderColor: COLORS.line, background: COLORS.paperCard }}>
                <div className="flex flex-col items-center pt-1">
                  <div className="w-2.5 h-2.5 rounded-full" style={{ background: ph.status === "Completada" ? COLORS.green : ph.status === "Bloqueada" ? COLORS.red : COLORS.accent }} />
                  {i < project.phases.length - 1 && <div className="w-px flex-1 mt-1" style={{ background: COLORS.line }} />}
                </div>
                <div className="flex-1 pb-1">
                  <div className="flex items-center justify-between">
                    <span className="font-medium">{ph.name}</span>
                    <Pill color={ph.status === "Completada" ? COLORS.green : ph.status === "Bloqueada" ? COLORS.red : COLORS.accent} soft={ph.status === "Completada" ? COLORS.greenSoft : ph.status === "Bloqueada" ? COLORS.redSoft : COLORS.accentSoft}>{ph.status}</Pill>
                  </div>
                  <p className="text-sm mt-1" style={{ color: COLORS.textDim }}>{ph.description}</p>
                  <div className="flex flex-wrap gap-x-4 gap-y-1 text-xs mt-2" style={{ color: COLORS.textDim }}>
                    <span className="flex items-center gap-1"><Calendar size={11} /> {fmtDate(ph.startDate)} → {fmtDate(ph.endDate)}</span>
                    <span className="flex items-center gap-1"><User size={11} /> {ph.owner || "—"}</span>
                  </div>
                  {ph.deliverables && <p className="text-xs mt-1.5"><b>Entregables:</b> {ph.deliverables}</p>}
                  {ph.benefit && <p className="text-xs mt-0.5"><b>Beneficio:</b> {ph.benefit}</p>}
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {tab === "riesgos" && (
        <div>
          {canEdit && (
            <button onClick={() => setShowRisk(true)} className="flex items-center gap-1.5 mb-4 px-3 py-2 rounded-lg text-sm font-medium text-white" style={{ background: COLORS.accent }}>
              <Plus size={14} /> Registrar riesgo
            </button>
          )}
          <div className="space-y-3">
            {project.risks.length === 0 && <EmptyState text="Sin riesgos registrados." />}
            {project.risks.map((r) => {
              const sv = SEVERIDAD[r.severity];
              return (
                <div key={r.id} className="rounded-2xl border p-4" style={{ borderColor: COLORS.line, background: COLORS.paperCard }}>
                  <div className="flex items-center justify-between mb-2">
                    <div className="flex gap-2">
                      <Pill color={sv.color} soft={sv.soft}>{r.severity}</Pill>
                      <Pill color={COLORS.textDim} soft="#F1F2F0">{r.status}</Pill>
                    </div>
                    <span className="text-xs" style={{ color: COLORS.textDim }}>{fmtDate(r.createdAt)}</span>
                  </div>
                  <p className="text-sm">{r.description}</p>
                  {r.mitigation && <p className="text-xs mt-2" style={{ color: COLORS.textDim }}><b>Mitigación:</b> {r.mitigation}</p>}
                  {r.owner && <p className="text-xs mt-1" style={{ color: COLORS.textDim }}><b>Responsable:</b> {r.owner}</p>}
                </div>
              );
            })}
          </div>
        </div>
      )}

      {tab === "actualizaciones" && (
        <div>
          {canEdit && (
            <button onClick={() => setShowUpdateForm(true)} className="flex items-center gap-1.5 mb-4 px-3 py-2 rounded-lg text-sm font-medium text-white" style={{ background: COLORS.accent }}>
              <Plus size={14} /> Nueva actualización semanal
            </button>
          )}
          <div className="space-y-3">
            {project.updates.length === 0 && <EmptyState text="Sin actualizaciones registradas todavía." />}
            {[...project.updates].reverse().map((u) => (
              <div key={u.id} className="rounded-2xl border p-4" style={{ borderColor: COLORS.line, background: COLORS.paperCard }}>
                <div className="flex items-center justify-between mb-2">
                  <span className="text-sm font-medium">{fmtDate(u.date)}</span>
                  <span className="text-xs" style={{ color: COLORS.textDim }}>{u.author}</span>
                </div>
                <UpdateRow label="Avances" value={u.advances} />
                <UpdateRow label="Cambios de estado" value={u.statusChange} />
                <UpdateRow label="Nuevos riesgos" value={u.newRisks} />
                <UpdateRow label="Próximos pasos" value={u.nextSteps} />
                <UpdateRow label="Decisiones necesarias" value={u.decisions} />
              </div>
            ))}
          </div>
        </div>
      )}

      {tab === "compartir" && isAdmin && (
        <div className="max-w-lg">
          <SharePanel
            project={project}
            users={users}
            onChange={(newSharedWith, notify) => {
              onShare({ ...project, sharedWith: newSharedWith }, notify);
            }}
          />
        </div>
      )}

      {showEdit && (
        <Modal title="Editar proyecto" onClose={() => setShowEdit(false)} wide>
          <ProjectForm initial={project} onCancel={() => setShowEdit(false)} onSave={(f) => { onUpdate({ ...project, ...f }); setShowEdit(false); }} />
        </Modal>
      )}
      {showPhase && (
        <Modal title="Añadir fase" onClose={() => setShowPhase(false)} wide>
          <PhaseForm onCancel={() => setShowPhase(false)} onSave={(f) => { onUpdate({ ...project, phases: [...project.phases, { ...f, id: uid() }] }); setShowPhase(false); }} />
        </Modal>
      )}
      {showRisk && (
        <Modal title="Registrar riesgo" onClose={() => setShowRisk(false)}>
          <RiskForm onCancel={() => setShowRisk(false)} onSave={(f) => { onUpdate({ ...project, risks: [...project.risks, { ...f, id: uid(), createdAt: todayISO() }] }); setShowRisk(false); }} />
        </Modal>
      )}
      {showUpdateForm && (
        <Modal title="Nueva actualización semanal" onClose={() => setShowUpdateForm(false)} wide>
          <UpdateForm
            project={project}
            onCancel={() => setShowUpdateForm(false)}
            onSave={(f) => {
              onUpdate({
                ...project,
                updates: [...project.updates, { ...f, id: uid() }],
                semaphore: f.semaphore,
                lastUpdateAt: f.date,
              }, f.semaphore === "red");
              setShowUpdateForm(false);
            }}
          />
        </Modal>
      )}
    </div>
  );
}

const Section = ({ title, children }) => (
  <div className="rounded-2xl border p-4" style={{ borderColor: COLORS.line, background: COLORS.paperCard }}>
    <h3 className="text-xs font-semibold uppercase tracking-wide mb-2" style={{ color: COLORS.textDim }}>{title}</h3>
    {children}
  </div>
);
const InfoRow = ({ label, value }) => (
  <div className="flex items-center justify-between py-1.5 text-sm border-b last:border-0" style={{ borderColor: COLORS.line }}>
    <span style={{ color: COLORS.textDim }}>{label}</span><span className="font-medium">{value}</span>
  </div>
);
const UpdateRow = ({ label, value }) => !value ? null : (
  <p className="text-sm mt-1.5"><span className="font-medium">{label}:</span> {value}</p>
);
const EmptyState = ({ text }) => (
  <div className="rounded-2xl border border-dashed p-8 text-center text-sm" style={{ borderColor: COLORS.line, color: COLORS.textDim }}>{text}</div>
);

/* ---------------------------------------------------------------
   USERS MANAGEMENT (admin only)
---------------------------------------------------------------- */
function UsersPage({ users, onCreateUser, onUpdateUser, onToggleActive, currentEmail }) {
  const [showNew, setShowNew] = useState(false);
  const [editing, setEditing] = useState(null);
  const [error, setError] = useState("");

  const addUser = async (u) => {
    setError("");
    try {
      await onCreateUser(u);
      setShowNew(false);
    } catch (e) {
      setError(e.message || String(e));
    }
  };
  const saveEdit = async (u) => {
    setError("");
    try {
      await onUpdateUser(editing.id, u);
      setEditing(null);
    } catch (e) {
      setError(e.message || String(e));
    }
  };
  const toggleActive = async (u) => {
    setError("");
    try {
      await onToggleActive(u.id, !u.active);
    } catch (e) {
      setError(e.message || String(e));
    }
  };

  return (
    <div>
      <div className="flex items-center justify-between mb-6">
        <div>
          <h1 className="text-2xl font-bold" style={{ fontFamily: "'Space Grotesk', sans-serif" }}>Usuarios</h1>
          <p className="text-sm mt-1" style={{ color: COLORS.textDim }}>Da de alta usuarios con contraseña y decide qué ven.</p>
        </div>
        <button onClick={() => setShowNew(true)} className="flex items-center gap-2 px-4 py-2.5 rounded-xl text-sm font-semibold text-white" style={{ background: COLORS.accent }}>
          <Plus size={16} /> Nuevo usuario
        </button>
      </div>
      {error && <div className="text-sm px-3 py-2 rounded-lg mb-4" style={{ background: COLORS.redSoft, color: COLORS.red }}>{error}</div>}

      <div className="rounded-2xl border overflow-hidden" style={{ borderColor: COLORS.line, background: COLORS.paperCard }}>
        <table className="w-full text-sm">
          <thead>
            <tr className="text-left border-b" style={{ borderColor: COLORS.line, color: COLORS.textDim }}>
              <th className="px-4 py-3 font-medium">Nombre</th>
              <th className="px-4 py-3 font-medium">Correo</th>
              <th className="px-4 py-3 font-medium">Rol</th>
              <th className="px-4 py-3 font-medium">Dispositivos</th>
              <th className="px-4 py-3 font-medium">Estado</th>
              <th className="px-4 py-3 font-medium"></th>
            </tr>
          </thead>
          <tbody>
            {users.map((u) => (
              <tr key={u.id} className="border-b last:border-0" style={{ borderColor: COLORS.line }}>
                <td className="px-4 py-3 font-medium">{u.name} {u.email === currentEmail && <span className="text-xs font-normal" style={{ color: COLORS.textDim }}>(tú)</span>}</td>
                <td className="px-4 py-3" style={{ color: COLORS.textDim }}>{u.email}</td>
                <td className="px-4 py-3"><Pill color={COLORS.accent} soft={COLORS.accentSoft}>{u.role}</Pill></td>
                <td className="px-4 py-3" style={{ color: COLORS.textDim }}>{u.trustedDevicesCount || 0}</td>
                <td className="px-4 py-3">
                  <button
                    onClick={() => u.email !== currentEmail && toggleActive(u)}
                    disabled={u.email === currentEmail}
                    className="text-xs font-semibold px-2.5 py-1 rounded-full"
                    style={{ background: u.active ? COLORS.greenSoft : "#F1F2F0", color: u.active ? COLORS.green : COLORS.textDim, opacity: u.email === currentEmail ? 0.6 : 1 }}
                  >
                    {u.active ? "Activo" : "Inactivo"}
                  </button>
                </td>
                <td className="px-4 py-3 text-right">
                  <button onClick={() => setEditing(u)} className="p-1.5 rounded-lg hover:bg-gray-100"><Pencil size={14} color={COLORS.textDim} /></button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {showNew && (
        <Modal title="Nuevo usuario" onClose={() => setShowNew(false)}>
          <UserForm onCancel={() => setShowNew(false)} onSave={addUser} existing={users} />
        </Modal>
      )}
      {editing && (
        <Modal title="Editar usuario" onClose={() => setEditing(null)}>
          <UserForm initial={editing} onCancel={() => setEditing(null)} onSave={saveEdit} existing={users} />
        </Modal>
      )}
    </div>
  );
}

function UserForm({ initial, onSave, onCancel, existing }) {
  const [f, setF] = useState(initial || { name: "", email: "", role: "Stakeholder", password: "" });
  const [password, setPassword] = useState("");
  const [confirm, setConfirm] = useState("");
  const set = (k) => (e) => setF({ ...f, [k]: e.target.value });
  const normalizedEmail = f.email.trim().toLowerCase();
  const emailTaken = !initial && existing.some((u) => u.email === normalizedEmail);
  const needsPassword = !initial;
  const passwordOk = needsPassword ? password.length >= 8 && password === confirm : (!password || (password.length >= 8 && password === confirm));
  const valid = f.name.trim() && validEmail(f.email) && !emailTaken && passwordOk;
  return (
    <div>
      <Field label="Nombre">
        <input className={inputCls} style={inputStyle} value={f.name} onChange={set("name")} />
      </Field>
      <Field label="Correo" hint={emailTaken ? "Ya existe un usuario con este correo." : "Con este correo entrará a la aplicación."}>
        <input className={inputCls} style={inputStyle} value={f.email} onChange={(e) => setF({ ...f, email: e.target.value.toLowerCase() })} disabled={!!initial} />
      </Field>
      <Field label="Rol">
        <select className={inputCls} style={inputStyle} value={f.role} onChange={set("role")}>
          {ROLES.map((r) => <option key={r}>{r}</option>)}
        </select>
      </Field>
      <Field label={initial ? "Nueva contraseña (opcional)" : "Contraseña"} hint={initial ? "Déjalo vacío para mantener la contraseña actual." : "Mínimo 8 caracteres."}>
        <PasswordInput value={password} onChange={(e) => setPassword(e.target.value)} autoComplete="new-password" />
      </Field>
      {(password || !initial) && (
        <Field label="Repetir contraseña" hint={confirm && password !== confirm ? "Las contraseñas no coinciden." : ""}>
          <PasswordInput value={confirm} onChange={(e) => setConfirm(e.target.value)} autoComplete="new-password" />
        </Field>
      )}
      <div className="flex justify-end gap-2 pt-2">
        <button onClick={onCancel} className="px-4 py-2 rounded-lg text-sm font-medium hover:bg-gray-100">Cancelar</button>
        <button disabled={!valid} onClick={() => onSave({ name: f.name.trim(), email: normalizedEmail, role: f.role, password: password || undefined })} style={{ background: valid ? COLORS.accent : "#C7C8E8" }} className="px-4 py-2 rounded-lg text-sm font-medium text-white">
          {initial ? "Guardar cambios" : "Dar de alta"}
        </button>
      </div>
    </div>
  );
}

/* ---------------------------------------------------------------
   NOTIFICATIONS BELL
---------------------------------------------------------------- */
function NotificationsBell({ notifications, currentEmail, onOpenProject, onMarkRead }) {
  const [open, setOpen] = useState(false);
  const mine = notifications.filter((n) => n.toEmail === currentEmail).sort((a, b) => new Date(b.date) - new Date(a.date));
  const unread = mine.filter((n) => !n.read).length;
  return (
    <div className="relative">
      <button onClick={() => setOpen(!open)} className="relative p-2 rounded-lg hover:bg-gray-100 transition">
        <Bell size={18} color={COLORS.ink} />
        {unread > 0 && (
          <span className="absolute -top-0.5 -right-0.5 w-4 h-4 rounded-full text-[10px] font-bold text-white flex items-center justify-center" style={{ background: COLORS.red }}>{unread}</span>
        )}
      </button>
      {open && (
        <>
          <div className="fixed inset-0 z-30" onClick={() => setOpen(false)} />
          <div className="absolute right-0 mt-2 w-80 bg-white rounded-2xl border shadow-xl z-40 overflow-hidden" style={{ borderColor: COLORS.line }}>
            <div className="px-4 py-3 border-b font-semibold text-sm" style={{ borderColor: COLORS.line }}>Notificaciones</div>
            <div className="max-h-80 overflow-y-auto">
              {mine.length === 0 && <p className="text-sm p-4" style={{ color: COLORS.textDim }}>Sin notificaciones.</p>}
              {mine.map((n) => (
                <button
                  key={n.id}
                  onClick={() => { onMarkRead(n.id); onOpenProject(n.projectId); setOpen(false); }}
                  className="w-full text-left px-4 py-3 border-b last:border-0 hover:bg-gray-50 transition"
                  style={{ borderColor: COLORS.line, background: n.read ? "white" : COLORS.accentSoft }}
                >
                  <p className="text-sm">{n.message}</p>
                  <span className="text-xs" style={{ color: COLORS.textDim }}>{fmtDateTime(n.date)}</span>
                </button>
              ))}
            </div>
          </div>
        </>
      )}
    </div>
  );
}

/* ---------------------------------------------------------------
   PROJECTS LIST
---------------------------------------------------------------- */
function ProjectsList({ projects, onOpen, onNew, canCreate }) {
  const [showArchived, setShowArchived] = useState(false);
  const list = projects.filter((p) => (showArchived ? p.archived : !p.archived));
  return (
    <div>
      <div className="flex items-center justify-between mb-6">
        <div>
          <h1 className="text-2xl font-bold" style={{ fontFamily: "'Space Grotesk', sans-serif" }}>Proyectos</h1>
          <p className="text-sm mt-1" style={{ color: COLORS.textDim }}>{list.length} proyecto{list.length !== 1 ? "s" : ""} {showArchived ? "archivados" : "activos"}</p>
        </div>
        <div className="flex gap-2">
          <button onClick={() => setShowArchived(!showArchived)} className="px-3 py-2 rounded-lg text-sm font-medium border hover:bg-gray-50" style={{ borderColor: COLORS.line }}>
            {showArchived ? "Ver activos" : "Ver archivados"}
          </button>
          {canCreate && (
            <button onClick={onNew} className="flex items-center gap-2 px-4 py-2.5 rounded-xl text-sm font-semibold text-white" style={{ background: COLORS.accent }}>
              <Plus size={16} /> Nuevo proyecto
            </button>
          )}
        </div>
      </div>
      <div className="grid grid-cols-2 gap-4">
        {list.length === 0 && <EmptyState text="No hay proyectos aquí." />}
        {list.map((p) => {
          const sem = SEMAFORO[p.semaphore];
          return (
            <button key={p.id} onClick={() => onOpen(p.id)} className="text-left rounded-2xl border p-5 hover:shadow-md transition" style={{ borderColor: COLORS.line, background: COLORS.paperCard }}>
              <div className="flex items-start gap-3">
                <SignalBar semaphore={p.semaphore} />
                <div className="flex-1 min-w-0">
                  <div className="font-semibold truncate">{p.name}</div>
                  <p className="text-xs mt-1 line-clamp-2" style={{ color: COLORS.textDim }}>{p.summary || p.objective}</p>
                  <div className="flex items-center gap-2 mt-3 flex-wrap">
                    <Pill color={sem.color} soft={sem.soft}>{sem.label}</Pill>
                    <Pill color={COLORS.accent} soft={COLORS.accentSoft}>{p.priority}</Pill>
                  </div>
                </div>
              </div>
            </button>
          );
        })}
      </div>
    </div>
  );
}

/* ---------------------------------------------------------------
   APP SHELL
---------------------------------------------------------------- */
function App() {
  const { url: apiUrl, loading: loadingUrl } = useSheetApiUrl();

  if (loadingUrl) {
    return (
      <div className="min-h-screen flex items-center justify-center" style={{ background: COLORS.paper }}>
        <Loader2 className="animate-spin" size={24} color={COLORS.accent} />
      </div>
    );
  }

  if (!apiUrl) {
    return (
      <div className="min-h-screen flex items-center justify-center px-4" style={{ background: COLORS.paper, fontFamily: "'Inter', sans-serif" }}>
        <style>{FONT_IMPORT}</style>
        <div className="max-w-md bg-white rounded-2xl border p-7 text-center" style={{ borderColor: COLORS.line }}>
          <AlertTriangle size={28} color={COLORS.red} className="mx-auto mb-3" />
          <h1 className="text-xl font-bold mb-2" style={{ fontFamily: "'Space Grotesk', sans-serif" }}>Falta configurar la conexión al Sheet</h1>
          <p className="text-sm" style={{ color: COLORS.textDim }}>
            Abre el archivo index.html y reemplaza la constante SHEET_API_URL por la URL de Apps Script que termina en /exec. Después vuelve a subir el archivo a GitHub.
          </p>
        </div>
      </div>
    );
  }

  return <ConnectedApp apiUrl={apiUrl} />;
}

function ConnectedApp({ apiUrl }) {
  const auth = useAuth(apiUrl);
  const [bootstrap, setBootstrap] = useState({ loading: true, setupRequired: false, passwordMigrationRequired: false, error: null });

  const projectsStore = useSheetCollection(apiUrl, "projects-data", [], auth.token);
  const usersStore = useSheetCollection(apiUrl, "users-data", [], auth.token);
  const notificationsStore = useSheetCollection(apiUrl, "notifications-data", [], auth.token);

  const { data: allProjects, setData: persistProjects, loading: loadingProjects, error: projectsError, saving } = projectsStore;
  const { data: users, setLocalData: setUsersLocal, loading: loadingUsers, error: usersError } = usersStore;
  const { data: notifications, setData: persistNotifications, error: notifError } = notificationsStore;

  useEffect(() => {
    let cancelled = false;
    const run = async () => {
      try {
        const info = await sheetTestConnection(apiUrl);
        if (!cancelled) setBootstrap({ loading: false, setupRequired: !!info.setupRequired, passwordMigrationRequired: !!info.passwordMigrationRequired, error: null });
      } catch (e) {
        if (!cancelled) setBootstrap({ loading: false, setupRequired: false, passwordMigrationRequired: false, error: e.message || String(e) });
      }
    };
    run();
    return () => { cancelled = true; };
  }, [apiUrl]);

  const [view, setView] = useState("dashboard");
  const [openId, setOpenId] = useState(() => getProjectIdFromUrl());
  const [showNew, setShowNew] = useState(false);

  if (bootstrap.loading || auth.loading) {
    return (
      <div className="min-h-screen flex items-center justify-center" style={{ background: COLORS.paper }}>
        <Loader2 className="animate-spin" size={24} color={COLORS.accent} />
      </div>
    );
  }

  if (bootstrap.error) {
    return (
      <div className="min-h-screen flex items-center justify-center px-4" style={{ background: COLORS.paper }}>
        <div className="max-w-sm text-center">
          <AlertTriangle size={28} color={COLORS.red} className="mx-auto mb-3" />
          <p className="text-sm mb-3" style={{ color: COLORS.textDim }}>No se pudo conectar con el Apps Script: {bootstrap.error}</p>
          <p className="text-xs mb-4" style={{ color: COLORS.textDim }}>
            Comprueba que Code.gs tenga el SPREADSHEET_ID correcto, que la implementación sea una nueva versión y que la Web App sea accesible para cualquier usuario.
          </p>
          <button onClick={() => window.location.reload()} className="px-4 py-2 rounded-lg text-sm font-semibold text-white" style={{ background: COLORS.accent }}>
            Reintentar
          </button>
        </div>
      </div>
    );
  }

  if (!auth.user) {
    if (bootstrap.setupRequired) {
      return (
        <SetupAdmin
          onCreate={async ({ name, email, password }) => {
            await auth.setupAdmin({ name, email, password });
            setBootstrap((b) => ({ ...b, setupRequired: false, passwordMigrationRequired: false }));
          }}
        />
      );
    }
    return (
      <SignIn
        rememberedEmail={auth.rememberedEmail}
        migrationRequired={bootstrap.passwordMigrationRequired}
        onSignIn={auth.login}
        onTrustedSignIn={auth.trustedLogin}
        onMigratePassword={async (payload) => {
          await auth.migratePassword(payload);
          setBootstrap((b) => ({ ...b, passwordMigrationRequired: false }));
        }}
      />
    );
  }

  const loading = loadingProjects || loadingUsers;
  const connError = projectsError || usersError || notifError;

  if (loading) {
    return (
      <div className="min-h-screen flex items-center justify-center" style={{ background: COLORS.paper }}>
        <Loader2 className="animate-spin" size={24} color={COLORS.accent} />
      </div>
    );
  }

  if (connError) {
    return (
      <div className="min-h-screen flex items-center justify-center px-4" style={{ background: COLORS.paper }}>
        <div className="max-w-sm text-center">
          <AlertTriangle size={28} color={COLORS.red} className="mx-auto mb-3" />
          <p className="text-sm mb-3" style={{ color: COLORS.textDim }}>{connError}</p>
          <p className="text-xs mb-4" style={{ color: COLORS.textDim }}>
            Comprueba que el Apps Script esté implementado como Aplicación web, ejecutándose como tú y accesible para cualquier usuario.
          </p>
          <button onClick={() => window.location.reload()} className="px-4 py-2 rounded-lg text-sm font-semibold text-white" style={{ background: COLORS.accent }}>
            Reintentar
          </button>
        </div>
      </div>
    );
  }

  const currentUser = users.find((u) => u.email === auth.user.email && u.active) || auth.user;
  const isAdmin = currentUser.role === "Admin";
  const canEditRole = currentUser.role === "Admin" || currentUser.role === "Project Owner";

  const visibleProjects = allProjects.filter((p) => {
    if (isAdmin) return true;
    if (p.sharedWith === "all") return true;
    return Array.isArray(p.sharedWith) && p.sharedWith.includes(currentUser.email);
  });

  // El backend relacional crea notificaciones y envía correo HTML cuando detecta:
  // 1) nuevos usuarios compartidos en un proyecto;
  // 2) nuevas actualizaciones en rojo.
  // Así evitamos duplicados y mantenemos una única fuente de verdad en el Sheet.
  const updateProject = (updated) => {
    persistProjects(allProjects.map((p) => (p.id === updated.id ? updated : p)));
  };

  const shareProject = (updated) => {
    persistProjects(allProjects.map((p) => (p.id === updated.id ? updated : p)));
  };

  const archiveProject = (id) => {
    persistProjects(allProjects.map((p) => (p.id === id ? { ...p, archived: true } : p)));
    setOpenId(null);
    setProjectIdInUrl(null);
  };
  const createProject = (f) => {
    const np = { ...f, id: uid(), archived: false, phases: [], risks: [], updates: [], lastUpdateAt: null, sharedWith: isAdmin ? [] : "all" };
    persistProjects([...allProjects, np]);
    setShowNew(false);
  };

  const createUser = async (u) => {
    const res = await adminCreateUserApi(apiUrl, auth.token, u);
    setUsersLocal(res.users || []);
  };
  const updateUser = async (id, u) => {
    const res = await adminUpdateUserApi(apiUrl, auth.token, id, u);
    setUsersLocal(res.users || []);
  };
  const toggleUserActive = async (id, active) => {
    const res = await adminSetUserActiveApi(apiUrl, auth.token, id, active);
    setUsersLocal(res.users || []);
  };

  const openProject = visibleProjects.find((p) => p.id === openId);
  const openProjectById = (id) => {
    if (!id) return;
    setOpenId(id);
    setProjectIdInUrl(id);
  };
  const closeProject = () => {
    setOpenId(null);
    setProjectIdInUrl(null);
  };
  const goToProject = (id) => { if (visibleProjects.some((p) => p.id === id)) openProjectById(id); };

  return (
    <div className="min-h-screen" style={{ background: COLORS.paper, fontFamily: "'Inter', sans-serif", color: COLORS.ink }}>
      <style>{FONT_IMPORT}</style>
      <div className="flex">
        <div className="w-56 min-h-screen flex flex-col shrink-0" style={{ background: COLORS.ink }}>
          <div className="px-5 py-5 flex items-center gap-2.5">
            <div className="w-7 h-7 rounded-lg flex items-center justify-center" style={{ background: COLORS.accent }}>
              <Target size={15} color="white" />
            </div>
            <span className="text-white font-semibold" style={{ fontFamily: "'Space Grotesk', sans-serif" }}>Trackr</span>
          </div>
          <nav className="px-3 mt-2 space-y-1">
            <button onClick={() => { setView("dashboard"); closeProject(); }} className="w-full flex items-center gap-2.5 px-3 py-2.5 rounded-lg text-sm font-medium transition" style={{ background: view === "dashboard" && !openId ? COLORS.inkSoft : "transparent", color: view === "dashboard" && !openId ? "white" : "#9CA3AF" }}>
              <LayoutDashboard size={16} /> Dashboard
            </button>
            <button onClick={() => { setView("projects"); closeProject(); }} className="w-full flex items-center gap-2.5 px-3 py-2.5 rounded-lg text-sm font-medium transition" style={{ background: view === "projects" && !openId ? COLORS.inkSoft : "transparent", color: view === "projects" && !openId ? "white" : "#9CA3AF" }}>
              <FolderKanban size={16} /> Proyectos
            </button>
            {isAdmin && (
              <button onClick={() => { setView("users"); closeProject(); }} className="w-full flex items-center gap-2.5 px-3 py-2.5 rounded-lg text-sm font-medium transition" style={{ background: view === "users" && !openId ? COLORS.inkSoft : "transparent", color: view === "users" && !openId ? "white" : "#9CA3AF" }}>
                <ShieldCheck size={16} /> Usuarios
              </button>
            )}
          </nav>
          <div className="mt-auto px-4 py-4 border-t" style={{ borderColor: "#2A303C" }}>
            <div className="flex items-center gap-2 mb-1">
              <div className="w-7 h-7 rounded-full flex items-center justify-center text-xs font-semibold text-white shrink-0" style={{ background: COLORS.accent }}>
                {currentUser.name.charAt(0).toUpperCase()}
              </div>
              <div className="min-w-0">
                <p className="text-sm font-medium text-white truncate">{currentUser.name}</p>
                <p className="text-xs truncate" style={{ color: "#6B7280" }}>{currentUser.role}</p>
              </div>
            </div>
            <button onClick={() => auth.logout()} className="w-full flex items-center gap-1.5 text-xs mt-2 px-2.5 py-1.5 rounded-lg hover:bg-white/5" style={{ color: "#9CA3AF" }}>
              <LogOut size={12} /> Cerrar sesión
            </button>
            <button onClick={() => auth.logout({ forgetDevice: true })} className="w-full flex items-center gap-1.5 text-xs mt-1 px-2.5 py-1.5 rounded-lg hover:bg-white/5" style={{ color: "#9CA3AF" }}>
              <ShieldAlert size={12} /> Olvidar dispositivo
            </button>
          </div>
        </div>

        <div className="flex-1 px-8 py-7 max-w-6xl">
          <div className="flex justify-end mb-2">
            <NotificationsBell
              notifications={notifications}
              currentEmail={currentUser.email}
              onOpenProject={goToProject}
              onMarkRead={(id) => persistNotifications(notifications.map((n) => (n.id === id ? { ...n, read: true } : n)))}
            />
          </div>

          {openProject ? (
            <ProjectDetail
              project={openProject}
              onBack={closeProject}
              onUpdate={updateProject}
              onShare={shareProject}
              onArchive={() => archiveProject(openProject.id)}
              canEdit={canEditRole}
              isAdmin={isAdmin}
              users={users}
            />
          ) : view === "users" && isAdmin ? (
            <UsersPage users={users} onCreateUser={createUser} onUpdateUser={updateUser} onToggleActive={toggleUserActive} currentEmail={currentUser.email} />
          ) : view === "dashboard" ? (
            <Dashboard projects={visibleProjects} onOpen={openProjectById} onNew={() => setShowNew(true)} canCreate={isAdmin} />
          ) : (
            <ProjectsList projects={visibleProjects} onOpen={openProjectById} onNew={() => setShowNew(true)} canCreate={isAdmin} />
          )}
        </div>
      </div>

      {showNew && (
        <Modal title="Nuevo proyecto" onClose={() => setShowNew(false)} wide>
          <ProjectForm onCancel={() => setShowNew(false)} onSave={createProject} />
        </Modal>
      )}

      {saving && (
        <div className="fixed bottom-4 right-4 flex items-center gap-2 text-xs px-3 py-2 rounded-lg shadow-lg text-white" style={{ background: COLORS.ink }}>
          <Loader2 className="animate-spin" size={12} /> Guardando en el Sheet…
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>

  <script>
    (function () {
      try {
        var src = document.getElementById("app-source").textContent;
        var out = Babel.transform(src, { presets: [["react", { runtime: "classic" }]] }).code;
        var s = document.createElement("script");
        s.textContent = out;
        document.body.appendChild(s);
      } catch (err) {
        document.getElementById("root").innerHTML =
          '<div style="font-family:sans-serif;max-width:640px;margin:60px auto;padding:20px;border:1px solid #eee;border-radius:12px;">' +
          '<h2 style="color:#D8483F;">Error al cargar Trackr</h2>' +
          '<p>' + (err && err.message ? err.message : err) + '</p>' +
          '<p style="color:#666;font-size:13px;">Copia este mensaje y compártelo para poder solucionarlo.</p>' +
          "</div>";
        console.error(err);
      }
    })();
  </script>
</body>
